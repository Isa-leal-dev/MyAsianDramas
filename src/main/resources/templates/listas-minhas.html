<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Minhas Listas</title>
	 <meta charset="UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" th:href="@{/css/base.css}"/>
    <link rel="stylesheet" th:href="@{/css/listas-minhas.css}"/>
</head>
<body>
  <div th:insert="~{base :: topo}"></div>
  <div th:insert="~{base :: menu}"></div>
  <main>
	<div class="page-header">
		<div class="page-header-left">
			<h1 class="page-titulo">Minhas Listas</h1>
			<span class="page-subtitulo" th:text="${listas.size()} + ' lista(s)'"></span>
        </div>
        <a th:href="@{/listas/criar}" th:if="${listas.size()>0}" class="btn-nova-lista">
            <i class="fa-solid fa-plus"></i>Nova Lista
        </a>
    </div>

    <!-- Lista vazia -->
    <div class="listas-vazio" th:if="${!temListas}">
        <i class="fa-regular fa-rectangle-list"></i>
		<p>Você ainda não tem nenhuma lista.</p>
        <a th:href="@{/listas/criar}" class="btn-nova-lista">Criar primeira lista</a>
    </div>

    <!-- Grid de listas -->
    <div class="listas-grid" th:if="${temListas}">
        <div class="lista-card" th:each="lista : ${listas}">

            <div class="lista-card-body">
                <div class="lista-card-header">
                    <a th:href="@{/listas/{id}(id=${lista.idLista})}" class="lista-nome" th:text="${lista.nomeLista}"></a>
                </div>
                <p class="lista-descricao" th:text="${lista.descricao}"></p>

                <div class="lista-card-footer">
                    <span class="lista-data">
                        <i class="fa-regular fa-calendar"></i>Criada em <span th:text="${lista.criadaEm}"></span>
                    </span>
                    <div class="lista-acoes">
                        <a th:href="@{/listas/{id}/atualizar(id=${lista.idLista})}" class="btn-acao btn-editar">
                            <i class="fa-solid fa-pen"></i>Editar
                        </a>
                        <button class="btn-acao btn-excluir">
                            <i class="fa-solid fa-trash"></i>Excluir
                    	</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </main>

  <div th:insert="~{base :: rodape}"></div>
</body>
</html>
