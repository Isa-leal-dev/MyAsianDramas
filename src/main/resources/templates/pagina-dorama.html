<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${dorama.tituloPortugues} + ' | MyAsianDramas'"></title>
    <meta charset="UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" th:href="@{/css/base.css}"/>
    <link rel="stylesheet" th:href="@{/css/pagina-conteudo.css}"/>
</head>
<body>
    <div th:replace="~{base :: topo}"></div>
    <div th:replace="~{base :: menu}"></div>

    <main>

        <!-- Poster e Dados gerais -->
        <div class="conteudo-topo">

            <img class="imagem-principal"
                 th:src="${dorama.poster}"
                 th:alt="${dorama.tituloPortugues}"/>

            <div class="conteudo-dados">
                <h1 class="titulo-pt" th:text="${dorama.tituloPortugues}"></h1>
                <p class="titulo-en" th:text="${dorama.tituloIngles}"></p>
                <p class="titulo-nativo"
                   th:text="${dorama.tituloNativo}"
                   th:if="${dorama.tituloNativo != dorama.tituloPortugues}"></p>

                <div class="conteudo-info-lista">
                    <div class="info-linha">
                        <span class="info-label">País</span>
                        <span class="info-valor">
                            <img th:src="'https://flagcdn.com/24x18/' + ${dorama.pais.name().toLowerCase()} + '.png'"
                                 th:alt="${dorama.pais.descricao}"/>
                            <span th:text="${dorama.pais.descricao}"></span>
                        </span>
                    </div>
                    <div class="info-linha">
                        <span class="info-label">Status</span>
                        <span class="info-valor" th:text="${dorama.statusDorama.descricao}"></span>
                    </div>
                    <div class="info-linha">
                        <span class="info-label">Episódios</span>
                        <span class="info-valor" th:text="${dorama.numeroEpisodios}"></span>
                    </div>
                    <div class="info-linha">
                        <span class="info-label">Emissora</span>
                        <span class="info-valor" th:text="${dorama.emissoraOriginal}"></span>
                    </div>

            <!--dataEstreiaFormatada e dataFinalFormatada - getters adicionados após ConversorData criado-->
                    <div class="info-linha">  
                        <span class="info-label">Estreia</span>
                        <span class="info-valor" th:text="${dorama.dataEstreiaFormatada}"></span>
                    </div>
                    <div class="info-linha" th:if="${dorama.dataFinal != null}">
                        <span class="info-label">Encerramento</span>
                        <span class="info-valor" th:text="${dorama.dataFinalFormatada}"></span>
                    </div>

                    <div class="info-linha">
                        <span class="info-label">Gêneros</span>
                        <div class="info-valor generos-lista">
                            <span th:each="genero : ${generos}" 
                                  class="genero-tag" 
                                  th:text="${genero}"></span>
                        </div>
                    </div>
                </div>

                <!-- Botão adicionar à lista -->
                <a th:href="'/listas/adicionar-dorama/' + ${dorama.idDorama}"
                   th:if="${session.usuarioLogado != null}"
                   class="btn-adicionar">
                    <i class="fa-solid fa-plus"></i> Adicionar à Lista
                </a>
            </div>
        </div>

        <!-- Sinopse -->
        <div class="secao" th:if="${dorama.sinopse != null}">
            <h2 class="secao-titulo">Sinopse</h2>
            <p class="sinopse" th:text="${dorama.sinopse}"></p>
        </div>

        <!-- Elenco -->
        <div class="secao">
            <h2 class="secao-titulo">Elenco</h2>
            <div class="conteudo-grid">
                <div class="grid-card" th:each="ator : ${atores}">

                    <a th:href="'/ator/' + ${ator.idAtor}">
                        <img class="grid-imagem"
                             th:src="${ator.fotoPerfil}"
                             th:alt="${ator.nomeAtor}"/>
                    </a>
                    <a th:href="'/ator/' + ${ator.idAtor}"
                       class="item-label"
                       th:text="${ator.nomeAtor}"></a>

                    <span th:each="p : ${personagens}" 
                          th:if="${ator.idAtor == p.idAtor}" 
                          th:text="${p.personagem}"
                          class="personagem"></span>
                </div>
            </div>
        </div>

    </main>

    <div th:replace="~{base :: rodape}"></div>
</body>
</html>
