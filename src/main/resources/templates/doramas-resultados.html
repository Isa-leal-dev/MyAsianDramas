<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${tituloPagina} + ' | MyAsianDramas'"></title>
    <meta charset="UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" th:href="@{/css/base.css}"/>
    <link rel="stylesheet" th:href="@{/css/resultados-busca.css}"/>
</head>
<body>
	<div th:insert="~{base :: topo}"></div>
    <div th:insert="~{base :: menu}"></div>

	<main>
        <div class="resultados-header">
            <h1 class="resultados-titulo" th:text="${tituloPagina}"></h1>
        </div>

        <div class="secao">
            <div class="resultados-grid">
                <a th:href="'/dorama/' + ${d.idDorama}" 
                   class="resultado-card"
                   th:each="d : ${doramas}">
                    <img class="resultado-poster"
                         th:src="${d.poster}"
                         th:alt="${d.tituloPortugues}"/>
                    <div class="resultado-info">
                        <span class="resultado-titulo-pt" th:text="${d.tituloPortugues}"></span>
                        <img class="dorama-flag" th:if="${mostrarBandeira}"
                             th:src="'https://flagcdn.com/24x18/' + ${d.pais.name().toLowerCase()} + '.png'"
                             th:alt="${d.pais.descricao}"/>
                        <span class="resultado-titulo-en" th:text="${d.tituloIngles}"></span>
                        <span class="resultado-titulo-nativo"
                              th:text="${d.tituloNativo}"
                              th:if="${d.tituloNativo != d.tituloPortugues}"></span>
                        <span class="resultado-ano" th:text="${d.dataEstreia.year}"></span>
                    </div>
                </a>
            </div>
        </div>

    </main>
	<div th:insert="~{base :: rodape}"></div>
</body>
</html>
