<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doramas Em Andamento</title>
    <meta charset="UTF-8" />
	<link rel="stylesheet" th:href="@{/css/base.css}"/>
</head>
<body>
  <div th:insert="~{base :: topo}"></div>
  <div th:insert="~{base :: menu}"></div>
    <table class="table table-striped table-primary">
    	<thead class="ttop">
        	<tr class="table-info">
            	<td><b>ID</b></td>
            	<td><b>TITULO PORTUGUÊS</b> </td>
            	<td><b>TITULO INGLÊS</b> </td>
                <td><b>TITULO NATIVO</b> </td>
				<td></td>
        	</tr>
    	</thead>
    	<tbody>
        	<tr th:each="d : ${doramas}">
            	<td th:text="${d.idDorama}"></td>
            	<td th:text="${d.tituloPortugues}"></td>
            	<td th:text="${d.tituloIngles}"></td>
                <td th:text="${d.tituloNativo}"></td>
				<td>
					<a th:href="@{'/'}">Inicio</a>
				</td>
       		</tr>
     	</tbody>
    </table>
</body>
</html>
