<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${lista.nomeLista} + ' | MyAsianDramas'">Página da Lista</title>
    <meta charset="UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" th:href="@{/css/base.css}"/>
    <link rel="stylesheet" th:href="@{/css/pagina-lista.css}"/>
</head>
<body>
    <div th:replace="~{base :: topo}"></div>
    <div th:replace="~{base :: menu}"></div>

    <main>
        <div class="lista-header">
            <div class="lista-header-info">
                <h1 class="lista-titulo" th:text="${lista.nomeLista}"></h1> 
                <p class="lista-descricao" th:text="${lista.descricao}" th:if="${lista.descricao != null}"></p>
                <span class="lista-meta">
                    <i class="fa-regular fa-calendar"></i>
					 <!--criadaEmFormatada - getter adicionado após ConversorData criado-->
                    Criada em <span th:text="${lista.criadaEmFormatada} + ' | ' + ${totalDoramas} + ' dorama(s)'"></span>
                </span>
            </div>
            <a th:href="@{/listas/minhas}" class="btn-voltar">
                <i class="fa-solid fa-arrow-left"></i> Minhas Listas
            </a>
        </div>
        <!-- Se lista estiver vazia--> 
        <div class="doramas-vazio" th:if="${doramas.isEmpty()}">
            <p>Nenhum dorama nesta lista ainda.</p>
            <a th:href="@{/}" class="btn-explorar">Explorar doramas</a>
        </div>
		<!-- Cards se lista não estiver vazia-->
		<div class="doramas-container" th:if="${!doramas.isEmpty()}">
			<div class="dorama-card" th:each="dorama : ${doramas}">

				<!-- Poster -->
				<a th:href="'/dorama/' + ${dorama.idDorama}" class="dorama-poster-link">
                <img class="dorama-poster"
					 	th:src="${dorama.poster}"
						th:alt="${dorama.tituloPortugues}">
				<!-- Informações -->
				<div class="dorama-info">
					<a th:href="'/dorama/' + ${dorama.idDorama}" class="titulo-pt"
								th:text="${dorama.tituloPortugues}"></a>
					<p class="titulo-en" th:text="${dorama.tituloIngles}"></p>
					<p class="titulo-nativo" th:text="${dorama.tituloNativo}"></p>

					<div class="dorama-dados">
						<div class="dorama-flag">
						<img th:src="'https://flagcdn.com/24x18/' + ${dorama.pais.name().toLowerCase()} + '.png'"
									th:alt="${dorama.pais.descricao}">
						</div>
						<span>
							<i class="fa-solid fa-tv"></i>
							<span th:text="${dorama.numeroEpisodios} + ' ep.'"></span>
						</span>

						<span class="status">
							<span th:text="${dorama.statusDorama.descricao}"></span>
						</span>
					</div>
				</div>

				<!-- Ações -->
				<div class="acoes">
					<form th:action="'/listas/' + ${lista.idLista} + '/remover-dorama'" 
						  method="post"
						  onsubmit="return confirm('Tem certeza que deseja remover este dorama da lista?')">
						<input type="hidden" name="idDorama" th:value="${dorama.idDorama}"/>
						<button type="submit" class="btn-remover">
							<i class="fa-solid fa-trash"></i> Remover
						</button>
					</form>
				</div>
			</div>
		</div>
    </main>

    <div th:replace="~{base :: rodape}"></div>
</body>
</html>
