<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro | MyAsianDramas</title>
    <link rel="stylesheet" th:href="@{css/auth.css}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="background-words">
        <span>Bem-vindo</span>
        <span>환영합니다</span>
        <span>ようこそ</span>
        <span>欢迎</span><!--Chinês simplificado-->
        <span>ยินดีต้อนรับ</span>
        <span>歡迎</span><!--Chinês tradicional-->
        <span>어서 오세요</span>
        <span>いらっしゃいませ</span>
    </div>

    <div class="auth-container">

        <div class="logo-area">
            <img th:src="@{/img/korean-heart.png}" alt="Logo">
            <h1>MyAsianDramas</h1>
            <p>Organize seus doramas favoritos do seu jeito</p>
        </div>

        <div class="auth-card">

            <h2>Cadastro</h2>
            <form th:action="@{/cadastro}" method="post" th:object="${cadastro}">
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" th:field="*{nome}" placeholder="Digite seu nome">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" placeholder="Digite seu email">
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" th:field="*{senha}" placeholder="Digite sua senha">
                </div>
                <button type="submit" class="btn-primary"> Cadastrar</button>             
                <div class="auth-links">
                    <a th:href="@{/}"> ← Voltar para início </a>
                </div>
            </form>
            <div class="auth-footer">
                <span>Já tem cadastro?</span>
                <a th:href="@{/login}">Faça o login aqui</a>
            </div>

            <p th:if="${erro}">Email já cadastrado!</p><!--Se email já consta no banco, mostra erro-->

        </div>

    </div>

</body>
</html>
